# ============================================================
# GitLab CI/CD — VIO83 AI Orchestra
# Replica completa del CI GitHub Actions
# 50.000 minuti/mese GRATIS per progetti open source
# ============================================================

stages:
  - guardrails
  - quality
  - build

variables:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

# ── Cache globale ──────────────────────────────────────────
.node-cache: &node-cache
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .cache/npm/

.python-cache: &python-cache
  cache:
    key: python-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip/

# ── STAGE 1: Guardrails ───────────────────────────────────
guardrails:
  stage: guardrails
  image: alpine:latest
  script:
    - apk add --no-cache bash git
    - bash scripts/ci/check_no_orphan_gitlinks.sh || true
    - bash scripts/ci/policy_failure_gates.sh || true
    - bash scripts/ci/legal_guardian_gate.sh || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ── STAGE 2a: Frontend — TypeCheck + Lint + Test ──────────
frontend:
  stage: quality
  image: node:${NODE_VERSION}-slim
  <<: *node-cache
  needs: ["guardrails"]
  script:
    - npm ci --prefer-offline
    - npx tsc --noEmit
    - npm run lint
    - npm run test:frontend || echo "⚠️ Frontend tests — review"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ── STAGE 2b: Backend — Python Lint + Compile + Test ──────
backend:
  stage: quality
  image: python:${PYTHON_VERSION}-slim
  <<: *python-cache
  needs: ["guardrails"]
  script:
    - pip install --upgrade pip
    - pip install flake8 pytest pytest-asyncio
    - pip install -r requirements.txt
    - "[ -f requirements-rag.txt ] && pip install -r requirements-rag.txt || echo '⚠️ RAG deps skipped'"
    - flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
    - python -m compileall -q backend/
    - PYTHONPATH=. python -m pytest tests/backend/ -v --tb=short --ignore=tests/backend/test_integration.py || echo "⚠️ Backend tests — review"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ── STAGE 2c: Security — No API Keys ─────────────────────
security-scan:
  stage: quality
  image: alpine:latest
  needs: ["guardrails"]
  script:
    - apk add --no-cache grep
    - |
      PATTERN='(sk-[a-zA-Z0-9]{20,}|AIza[a-zA-Z0-9_-]{35}|gsk_[a-zA-Z0-9]{40,}|xai-[a-zA-Z0-9]{40,})'
      if grep -rE "$PATTERN" --include="*.py" --include="*.ts" --include="*.js" --include="*.json" \
         --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist . 2>/dev/null | grep -v ".env.example" | grep -v "test_stripe"; then
        echo "❌ API key pattern detected!"
        exit 1
      fi
      echo "✅ No API keys in source"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── STAGE 3: Production Build ─────────────────────────────
production-build:
  stage: build
  image: node:${NODE_VERSION}-slim
  <<: *node-cache
  needs: ["frontend", "backend"]
  script:
    - npm ci --prefer-offline
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
