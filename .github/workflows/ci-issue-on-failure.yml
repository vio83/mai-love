name: CI - Issue on Permanent Failure

"on":
  workflow_run:
    workflows:
      - "CI — Release Gate"
      - "Python Backend — Lint & Test"
      - "Snyk Security"
      - "Release — VIO 83 AI Orchestra"
      - "Auto-Maintenance 100x"
    types:
      - completed

permissions:
  issues: write
  contents: read

jobs:
  open-issue-on-permanent-failure:
    name: "Open issue on second consecutive failure"
    runs-on: ubuntu-latest
    # Only trigger on the second attempt (after auto-rerun has already retried once)
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt >= 2
    steps:
      - name: "Open GitHub Issue — permanent CI failure"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflowName = context.payload.workflow_run.name;
            const runUrl = context.payload.workflow_run.html_url;
            const runAttempt = context.payload.workflow_run.run_attempt;
            const branch = context.payload.workflow_run.head_branch;
            const sha = context.payload.workflow_run.head_sha.substring(0, 7);
            const now = new Date().toISOString();

            // Check if an open issue for this workflow already exists (avoid duplicates)
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
            });

            const duplicate = existingIssues.data.find(issue =>
              issue.title.includes(workflowName)
            );

            if (duplicate) {
              console.log(`Issue already open: #${duplicate.number} — skipping`);
              // Add a comment to the existing issue instead
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `**Nuova failure** — Attempt ${runAttempt} | Branch: \`${branch}\` | SHA: \`${sha}\`\n\nRun: ${runUrl}\nData: ${now}`,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 CI Failure permanente: ${workflowName} [${sha}]`,
              body: [
                `## CI Failure Permanente`,
                ``,
                `Il workflow **${workflowName}** ha fallito ${runAttempt} volte consecutive.`,
                `L'auto-rerun ha già eseguito 1 retry automatico — questa è una failure vera.`,
                ``,
                `| Campo | Valore |`,
                `|-------|--------|`,
                `| Workflow | ${workflowName} |`,
                `| Branch | \`${branch}\` |`,
                `| SHA | \`${sha}\` |`,
                `| Attempt | ${runAttempt} |`,
                `| Data | ${now} |`,
                `| Run URL | [Apri Run](${runUrl}) |`,
                ``,
                `## Azione richiesta`,
                `1. Apri il run URL e leggi l'errore`,
                `2. Fixa la causa root`,
                `3. Chiudi questa issue con commit di riferimento`,
                ``,
                `*Auto-generato da CI — Issue on Permanent Failure workflow*`,
              ].join('\n'),
              labels: ['ci-failure', 'priority-high', 'automated'],
            });
            console.log(`Issue creata per failure di: ${workflowName}`);
