name: CI — Release Gate

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    name: Guardrails (Repo Hygiene + Policy Gates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enforce no orphan gitlinks
        run: bash scripts/ci/check_no_orphan_gitlinks.sh

      - name: Enforce policy failure gates
        run: bash scripts/ci/policy_failure_gates.sh

  frontend:
    name: Frontend (TypeCheck + Lint + Build)
    runs-on: ubuntu-latest
    needs: [guardrails]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test:frontend

      - name: Production build
        run: npm run build

  backend:
    name: Backend (Lint + Compile)
    runs-on: ubuntu-latest
    needs: [guardrails]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-asyncio
          pip install -r requirements.txt
          if [ -f requirements-rag.txt ]; then
            pip install -r requirements-rag.txt || echo "⚠️ RAG deps skipped (optional)"
          fi

      - name: Flake8 — critical errors only
        run: |
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Python compile check
        run: python -m compileall -q backend/

      - name: Backend unit tests
        run: |
          PYTHONPATH=. python -m pytest tests/backend/ -v --tb=short \
            --ignore=tests/backend/test_integration.py

  tauri-check:
    name: Tauri Cargo Check (macOS)
    runs-on: macos-latest
    continue-on-error: true
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Cargo check (Tauri)
        run: cd src-tauri && cargo check
