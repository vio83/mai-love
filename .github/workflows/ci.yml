name: CI — Release Gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (TypeCheck + Lint + Test + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: ESLint
        run: npm run lint || echo "::warning::ESLint warnings found"

      - name: Unit tests (Vitest)
        run: npm run test:frontend || echo "::warning::Some frontend tests failed"

      - name: Production build
        run: npm run build

  backend:
    name: Backend (Lint + Compile + Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt || echo "::warning::Some optional deps failed (expected on CI)"
          # Installa argon2 per il nuovo sistema auth
          pip install argon2-cffi || true

      - name: Flake8 lint (critical errors only)
        run: |
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Python compile check (all modules)
        run: python -m compileall -q backend/

      - name: Backend unit tests
        run: |
          PYTHONPATH=. python -m unittest discover -s tests/backend -v 2>&1 || echo "::warning::Some backend tests had issues"
        continue-on-error: true

  tauri-check:
    name: Tauri Check (macOS)
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Cargo check (Tauri)
        run: cd src-tauri && cargo check
