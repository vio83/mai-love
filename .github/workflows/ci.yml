name: CI — Release Gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (TypeCheck + Lint + Test + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
        continue-on-error: true

      - name: Unit tests (Vitest)
        run: npm run test:frontend
        continue-on-error: true

      - name: Production build
        run: npm run build

  backend:
    name: Backend (Lint + Compile + Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

          # Installa dipendenze core (sempre funzionanti)
          pip install fastapi uvicorn python-dotenv pydantic httpx pypdf python-docx argon2-cffi numpy tavily-python

          # Dipendenze opzionali (falliscono silenziosamente se non compatibili)
          pip install chromadb sentence-transformers scikit-optimize 2>/dev/null || true

      - name: Flake8 lint (critical errors only)
        run: |
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Python compile check (all modules)
        run: python -m compileall -q backend/

      - name: Backend unit tests
        run: |
          PYTHONPATH=. python -m pytest tests/backend/ -v --tb=short 2>&1 || true
        continue-on-error: true

  tauri-check:
    name: Tauri Cargo Check (macOS)
    runs-on: macos-latest
    # Solo su push al main, non su PR (risparmia minuti Actions)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Cargo check (Tauri)
        run: cd src-tauri && cargo check
