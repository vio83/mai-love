name: Snyk Security

"on":
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk-node:
    name: Snyk Node Scan
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SNYK_TOKEN
        id: token
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::SNYK_TOKEN not configured — skipping Node scan"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.token.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        if: steps.token.outputs.skip != 'true'
        run: npm ci

      - name: Setup Snyk
        if: steps.token.outputs.skip != 'true'
        uses: snyk/actions/setup@0.4.0

      - name: Snyk test (high+)
        if: steps.token.outputs.skip != 'true'
        run: snyk test --severity-threshold=high --all-projects --detection-depth=4

      - name: Snyk monitor (main only)
        if: steps.token.outputs.skip != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: snyk monitor --all-projects --detection-depth=4

  snyk-python:
    name: Snyk Python Scan
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SNYK_TOKEN
        id: token
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::SNYK_TOKEN not configured — skipping Python scan"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.token.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Snyk
        if: steps.token.outputs.skip != 'true'
        uses: snyk/actions/setup@0.4.0

      - name: Snyk test requirements.txt (high+)
        if: steps.token.outputs.skip != 'true'
        run: snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high

      - name: Snyk test requirements-rag.txt (best effort)
        if: steps.token.outputs.skip != 'true'
        run: snyk test --file=requirements-rag.txt --package-manager=pip --severity-threshold=high || true

      - name: Snyk monitor python manifests (main only)
        if: steps.token.outputs.skip != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          snyk monitor --file=requirements.txt --package-manager=pip
          snyk monitor --file=requirements-rag.txt --package-manager=pip || true
