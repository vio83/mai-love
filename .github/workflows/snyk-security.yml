name: Snyk Security

"on":
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk-check:
    name: Snyk Token Check
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.token.outputs.has_token }}
    steps:
      - name: Check SNYK_TOKEN availability
        id: token
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "::notice::SNYK_TOKEN not configured — all Snyk scans will be skipped"
          else
            echo "has_token=true" >> $GITHUB_OUTPUT
          fi

  snyk-node:
    name: Snyk Node Scan
    runs-on: ubuntu-latest
    needs: snyk-check
    if: needs.snyk-check.outputs.has_token == 'true'
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Setup Snyk
        uses: snyk/actions/setup@0.4.0

      - name: Snyk test (high+)
        run: snyk test --severity-threshold=high --all-projects --detection-depth=4

      - name: Snyk monitor (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: snyk monitor --all-projects --detection-depth=4

  snyk-python:
    name: Snyk Python Scan
    runs-on: ubuntu-latest
    needs: snyk-check
    if: needs.snyk-check.outputs.has_token == 'true'
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Snyk
        uses: snyk/actions/setup@0.4.0

      - name: Snyk test requirements.txt (high+)
        run: snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high

      - name: Snyk test requirements-rag.txt (best effort)
        run: snyk test --file=requirements-rag.txt --package-manager=pip --severity-threshold=high || true

      - name: Snyk monitor python manifests (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          snyk monitor --file=requirements.txt --package-manager=pip
          snyk monitor --file=requirements-rag.txt --package-manager=pip || true

  snyk-summary:
    name: Snyk Summary
    runs-on: ubuntu-latest
    needs: [snyk-check, snyk-node, snyk-python]
    if: always()
    steps:
      - name: Report result
        run: |
          if [ "${{ needs.snyk-check.outputs.has_token }}" != "true" ]; then
            echo "::notice::Snyk scans skipped — SNYK_TOKEN not configured"
            echo "Add SNYK_TOKEN to repository secrets to enable security scanning."
          else
            echo "Snyk scans completed."
            echo "Node: ${{ needs.snyk-node.result }}"
            echo "Python: ${{ needs.snyk-python.result }}"
          fi
