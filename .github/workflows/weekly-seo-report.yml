name: Weekly SEO & Sponsor Growth Report

on:
  schedule:
    # Every Monday at 07:00 UTC (09:00 Italy)
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: weekly-seo-report-${{ github.ref }}
  cancel-in-progress: true

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Weekly Report
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STARS=$(gh api repos/vio83/vio83-ai-orchestra --jq '.stargazers_count' 2>/dev/null || echo "0")
          FORKS=$(gh api repos/vio83/vio83-ai-orchestra --jq '.forks_count' 2>/dev/null || echo "0")
          WATCHERS=$(gh api repos/vio83/vio83-ai-orchestra --jq '.subscribers_count' 2>/dev/null || echo "0")
          ISSUES=$(gh api repos/vio83/vio83-ai-orchestra --jq '.open_issues_count' 2>/dev/null || echo "0")
          COMMITS=$(git rev-list --count HEAD 2>/dev/null || echo "0")
          TODAY=$(date +%Y-%m-%d)
          WEEK=$(date +%V)

          TRAFFIC=$(gh api repos/vio83/vio83-ai-orchestra/traffic/views --jq '.count' 2>/dev/null || echo "N/A")
          CLONES=$(gh api repos/vio83/vio83-ai-orchestra/traffic/clones --jq '.count' 2>/dev/null || echo "N/A")
          REFERRERS=$(gh api repos/vio83/vio83-ai-orchestra/traffic/popular/referrers --jq '.[].referrer' 2>/dev/null || echo "N/A")

          mkdir -p data
          cat > "data/weekly-report-${TODAY}.md" << REPORT_EOF
          # Weekly Growth Report — Week ${WEEK} (${TODAY})

          ## GitHub Stats
          | Metric | Value |
          |--------|-------|
          | Stars | ${STARS} |
          | Forks | ${FORKS} |
          | Watchers | ${WATCHERS} |
          | Open Issues | ${ISSUES} |
          | Total Commits | ${COMMITS} |
          | Page Views (14d) | ${TRAFFIC} |
          | Git Clones (14d) | ${CLONES} |

          ## Top Referrers
          ${REFERRERS}

          ## Action Items
          - [ ] Post 2 LinkedIn updates (Mon + Thu)
          - [ ] Share 1 weekly progress update on Ko-fi (Wed)
          - [ ] Publish 1 GitHub progress/release update (Fri)
          - [ ] Star 5 related repositories
          - [ ] Comment on 3 AI-related LinkedIn posts
          - [ ] Contact 3-5 potential sponsors via DM
          - [ ] Verify Support Hub links and CTA consistency

          ---
          *Auto-generated by VIO 83 SEO Bot*
          REPORT_EOF

          echo "Report generated: data/weekly-report-${TODAY}.md"

      - name: Close previous weekly report issues
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list --label "weekly-report" --state open --json number --jq '.[].number' | while read -r num; do
            gh issue close "$num" -c "Superseded by new weekly report" || true
          done

      - name: Create GitHub Issue with report
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          WEEK=$(date +%V)
          REPORT_FILE="data/weekly-report-${TODAY}.md"
          if [ -f "$REPORT_FILE" ]; then
            gh issue create \
              --title "Weekly Growth Report — Week ${WEEK} (${TODAY})" \
              --label "weekly-report" \
              --body-file "$REPORT_FILE" || echo "Issue creation skipped"
          else
            echo "No report file found — skipping issue creation"
          fi

      - name: Commit report
        continue-on-error: true
        run: |
          git config user.name "VIO 83 Report Bot"
          git config user.email "porcu.v.83@gmail.com"
          git add data/ 2>/dev/null || true
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "chore(report): weekly growth report [skip ci]"
            git pull --rebase --autostash || true
            git push || echo "Push skipped — will retry next run"
          }
