name: Weekly SEO & Sponsor Growth Report

on:
  schedule:
    # Every Monday at 07:00 UTC (09:00 Italy)
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Weekly Report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STARS=$(gh api repos/vio83/vio83-ai-orchestra --jq '.stargazers_count')
          FORKS=$(gh api repos/vio83/vio83-ai-orchestra --jq '.forks_count')
          WATCHERS=$(gh api repos/vio83/vio83-ai-orchestra --jq '.subscribers_count')
          ISSUES=$(gh api repos/vio83/vio83-ai-orchestra --jq '.open_issues_count')
          COMMITS=$(git rev-list --count HEAD)
          TODAY=$(date +%Y-%m-%d)
          WEEK=$(date +%V)

          # Count unique visitors (from stats if available)
          TRAFFIC=$(gh api repos/vio83/vio83-ai-orchestra/traffic/views --jq '.count' 2>/dev/null || echo "N/A")
          CLONES=$(gh api repos/vio83/vio83-ai-orchestra/traffic/clones --jq '.count' 2>/dev/null || echo "N/A")
          REFERRERS=$(gh api repos/vio83/vio83-ai-orchestra/traffic/popular/referrers --jq '.[].referrer' 2>/dev/null || echo "N/A")

          REPORT="# Weekly Growth Report â€” Week $WEEK ($TODAY)

          ## GitHub Stats
          | Metric | Value |
          |--------|-------|
          | Stars | $STARS |
          | Forks | $FORKS |
          | Watchers | $WATCHERS |
          | Open Issues | $ISSUES |
          | Total Commits | $COMMITS |
          | Page Views (14d) | $TRAFFIC |
          | Git Clones (14d) | $CLONES |

          ## Top Referrers
          $REFERRERS

          ## Action Items
          - [ ] Post LinkedIn update with this week's stats
          - [ ] Share weekly progress on Ko-fi
          - [ ] Star 5 related repositories
          - [ ] Comment on 3 AI-related LinkedIn posts
          - [ ] Contact 2 potential sponsors via DM

          ---
          *Auto-generated by VIO 83 SEO Bot*"

          echo "$REPORT" > data/weekly-report-$TODAY.md

      - name: Create GitHub Issue with report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          WEEK=$(date +%V)
          gh issue create \
            --title "đź“Š Weekly Growth Report â€” Week $WEEK ($TODAY)" \
            --body-file data/weekly-report-$TODAY.md \
            --label "automation,growth" || true

      - name: Commit report
        run: |
          git config user.name "VIO 83 Report Bot"
          git config user.email "porcu.v.83@gmail.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore(report): weekly growth report [skip ci]"
          git push || true
