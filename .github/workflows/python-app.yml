name: Python Backend — Lint & Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit pytest pytest-cov
          pip install sentry-sdk loguru
          pip install -r requirements.txt || true
          pip install -r requirements-rag.txt 2>/dev/null || true

      - name: Flake8 — critical errors only
        run: |
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Compile check — all Python modules
        run: python -m compileall -q backend/

      - name: Syntax verification
        run: |
          cd backend
          python3 << 'PYEOF'
          import pathlib, sys
          errors = 0
          for f in pathlib.Path('.').rglob('*.py'):
              if f.name == '__init__.py':
                  continue
              try:
                  compile(open(f).read(), f, 'exec')
              except SyntaxError as e:
                  print(f'  FAIL: {f} -- {e}')
                  errors += 1
          total = len(list(pathlib.Path('.').rglob('*.py')))
          print(f'Checked {total} files, {errors} errors')
          if errors:
              print('ERROR: Syntax issues detected')
              sys.exit(1)
          PYEOF

      - name: Bandit SAST — security scan (GAP-03)
        run: |
          bandit -r backend/ -ll -x backend/rag/,backend/__pycache__/ --quiet
        continue-on-error: false

      - name: Pytest with coverage (GAP-02)
        run: |
          PYTHONPATH=. python -m pytest tests/backend/ \
            --cov=backend --cov-report=xml --cov-report=term-missing \
            --ignore=tests/backend/test_integration.py \
            -q 2>&1 | tail -20
        env:
          PYTHONPATH: .

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
