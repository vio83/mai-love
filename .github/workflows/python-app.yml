name: Python Backend — Lint & Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 || pip install flake8

          # Dipendenze core
          pip install fastapi uvicorn python-dotenv pydantic httpx || true
          pip install pypdf python-docx argon2-cffi numpy || true
          pip install tavily-python 2>/dev/null || true

          # Dipendenze opzionali
          pip install chromadb sentence-transformers scikit-optimize 2>/dev/null || true

      - name: Flake8 — critical errors only
        run: |
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Compile check — all Python modules
        run: python -m compileall -q backend/

      - name: Syntax verification
        run: |
          cd backend
          python3 << 'PYEOF'
          import pathlib, sys
          errors = 0
          for f in pathlib.Path('.').rglob('*.py'):
              if f.name == '__init__.py':
                  continue
              try:
                  compile(open(f).read(), f, 'exec')
              except SyntaxError as e:
                  print(f'  FAIL: {f} -- {e}')
                  errors += 1
          total = len(list(pathlib.Path('.').rglob('*.py')))
          print(f'Checked {total} files, {errors} errors')
          if errors:
              print('WARNING: Syntax issues detected')
          PYEOF
