name: Python Backend — Lint & Test

on:
  push:
    branches: ["main"]
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - '.github/workflows/python-app.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'backend/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

          # Installa dipendenze core una per una (più resiliente)
          pip install fastapi uvicorn python-dotenv pydantic httpx
          pip install pypdf python-docx argon2-cffi numpy
          pip install tavily-python 2>/dev/null || true

          # Dipendenze opzionali (possono fallire)
          pip install chromadb sentence-transformers scikit-optimize 2>/dev/null || true

      - name: Lint backend with flake8
        run: |
          # Stop solo su errori di sintassi o nomi non definiti
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings solo informativi (non bloccano)
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Compile check — all Python modules
        run: python -m compileall -q backend/

      - name: Syntax verification
        run: |
          cd backend
          python -c "
          import pathlib, sys
          errors = 0
          for f in pathlib.Path('.').rglob('*.py'):
              if f.name == '__init__.py': continue
              try:
                  compile(open(f).read(), f, 'exec')
              except SyntaxError as e:
                  print(f'  FAIL: {f} — {e}')
                  errors += 1
          total = len(list(pathlib.Path('.').rglob('*.py')))
          print(f'Checked {total} files, {errors} errors')
          if errors:
              sys.exit(1)
          "
