name: Release — VIO 83 AI Orchestra

# TRIGGER SOLO SU TAG VERSIONE — NON su push al main!
# Per creare una release: git tag v0.9.0 && git push --tags
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-beta"
      - "v[0-9]+.[0-9]+.[0-9]+-alpha"

  # Permetti anche trigger manuale
  workflow_dispatch:
    inputs:
      skip_sign:
        description: "Skip Apple signing (for testing)"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Pre-check: verifica che i secrets necessari esistano ───
  preflight:
    name: Preflight Check
    runs-on: ubuntu-latest
    outputs:
      has_apple_cert: ${{ steps.check.outputs.has_apple_cert }}
      has_tauri_key: ${{ steps.check.outputs.has_tauri_key }}
    steps:
      - name: Check available secrets
        id: check
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}
          TAURI_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: |
          if [ -n "$APPLE_CERT" ]; then
            echo "has_apple_cert=true" >> $GITHUB_OUTPUT
          else
            echo "has_apple_cert=false" >> $GITHUB_OUTPUT
            echo "::warning::Apple Certificate not configured — build will be UNSIGNED"
          fi
          if [ -n "$TAURI_KEY" ]; then
            echo "has_tauri_key=true" >> $GITHUB_OUTPUT
          else
            echo "has_tauri_key=false" >> $GITHUB_OUTPUT
            echo "::warning::Tauri signing key not configured — updater will be disabled"
          fi

  # ─── Build macOS .dmg ──────────────────────────────
  build-macos:
    name: macOS Build
    runs-on: macos-latest
    needs: preflight
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          pip install fastapi uvicorn python-dotenv pydantic httpx pypdf python-docx argon2-cffi numpy || true

      - name: Import Apple Developer Certificate
        if: needs.preflight.outputs.has_apple_cert == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY || '' }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '' }}
        run: |
          # Build per architettura nativa (arm64 su GitHub Actions macOS)
          npm run tauri build 2>&1 || {
            echo "::warning::Tauri build failed — check Rust/dependencies"
            exit 1
          }

      - name: Find and upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VIO83-AI-Orchestra-macOS
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: warn

  # ─── GitHub Release ─────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-macos
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: VIO83-AI-Orchestra-macOS
          path: ./release-artifacts
        continue-on-error: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/## \[$VERSION\]/,/^---$/" CHANGELOG.md | head -50 | tail -n +2)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION} of VIO 83 AI Orchestra"
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VIO 83 AI Orchestra v${{ steps.version.outputs.VERSION }}"
          body: ${{ steps.notes.outputs.NOTES }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          files: |
            ./release-artifacts/**/*.dmg
            ./release-artifacts/**/*.app.tar.gz
            ./release-artifacts/**/*.app.tar.gz.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
