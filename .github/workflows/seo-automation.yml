name: SEO Automation — Ping Search Engines & Update Sitemap

on:
  # Runs every day at 06:00 UTC (08:00 Italy)
  schedule:
    - cron: "0 6 * * *"
  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seo-automation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  seo-ping-and-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure sitemap.xml exists
        run: |
          mkdir -p docs
          if [ ! -f docs/sitemap.xml ] || ! grep -q '<urlset' docs/sitemap.xml; then
            python3 -c "from pathlib import Path; from datetime import date; today = date.today().isoformat(); xml = ('<?xml version=\"1.0\" encoding=\"UTF-8\"?>\\n' '<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\\n' '  <url>\\n' '    <loc>https://vio83.github.io/vio83-ai-orchestra/</loc>\\n' f'    <lastmod>{today}</lastmod>\\n' '    <changefreq>daily</changefreq>\\n' '    <priority>1.0</priority>\\n' '  </url>\\n' '</urlset>\\n'); Path('docs/sitemap.xml').write_text(xml, encoding='utf-8')"
            echo "Created or restored docs/sitemap.xml"
          fi

      - name: Update sitemap lastmod date
        run: |
          python3 -c "from pathlib import Path; import re; from datetime import date; p = Path('docs/sitemap.xml'); xml = p.read_text(encoding='utf-8'); today = date.today().isoformat(); xml = re.sub(r'<lastmod>.*?</lastmod>', f'<lastmod>{today}</lastmod>', xml) if '<lastmod>' in xml else xml.replace('</url>', f'  <lastmod>{today}</lastmod>\\n  </url>'); p.write_text(xml, encoding='utf-8'); print(f'Updated sitemap.xml with date: {today}')"

      - name: Ping search engines
        continue-on-error: true
        run: |
          echo "--- Pinging Google ---"
          curl -sf --connect-timeout 10 "https://www.google.com/ping?sitemap=https://vio83.github.io/vio83-ai-orchestra/sitemap.xml" || echo "Google ping skipped"

          echo "--- Pinging Bing ---"
          curl -sf --connect-timeout 10 "https://www.bing.com/ping?sitemap=https://vio83.github.io/vio83-ai-orchestra/sitemap.xml" || echo "Bing ping skipped"

          echo "--- Pinging IndexNow ---"
          if [ -n "${{ secrets.SEO_INDEXNOW_KEY }}" ]; then
            curl -sf --connect-timeout 10 -X POST "https://api.indexnow.org/indexnow" \
              -H "Content-Type: application/json" \
              -d "{
                \"host\": \"vio83.github.io\",
                \"key\": \"${{ secrets.SEO_INDEXNOW_KEY }}\",
                \"keyLocation\": \"https://vio83.github.io/vio83-ai-orchestra/${{ secrets.SEO_INDEXNOW_KEY }}.txt\",
                \"urlList\": [
                  \"https://vio83.github.io/vio83-ai-orchestra/\",
                  \"https://vio83.github.io/vio83-ai-orchestra/sitemap.xml\"
                ]
              }" || echo "IndexNow ping skipped"
          else
            echo "::warning::SEO_INDEXNOW_KEY secret not set — IndexNow ping skipped"
          fi

          echo "All pings completed"

      - name: Fetch GitHub repo stats
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STARS=$(gh api repos/vio83/vio83-ai-orchestra --jq '.stargazers_count' 2>/dev/null || echo "0")
          FORKS=$(gh api repos/vio83/vio83-ai-orchestra --jq '.forks_count' 2>/dev/null || echo "0")
          WATCHERS=$(gh api repos/vio83/vio83-ai-orchestra --jq '.subscribers_count' 2>/dev/null || echo "0")
          ISSUES=$(gh api repos/vio83/vio83-ai-orchestra --jq '.open_issues_count' 2>/dev/null || echo "0")
          TODAY=$(date +%Y-%m-%d)

          mkdir -p data
          echo "{\"date\":\"$TODAY\",\"stars\":$STARS,\"forks\":$FORKS,\"watchers\":$WATCHERS,\"issues\":$ISSUES}" >> data/growth-stats.jsonl

          echo "=== VIO 83 Daily Stats ($TODAY) ==="
          echo "Stars: $STARS | Forks: $FORKS | Watchers: $WATCHERS | Issues: $ISSUES"

      - name: Commit changes
        continue-on-error: true
        run: |
          git config user.name "VIO 83 SEO Bot"
          git config user.email "porcu.v.83@gmail.com"
          git add docs/sitemap.xml data/growth-stats.jsonl 2>/dev/null || true
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "chore(seo): daily sitemap update + stats tracking [skip ci]"
            git pull --rebase --autostash || true
            git push || echo "Push skipped — will retry next run"
          }
