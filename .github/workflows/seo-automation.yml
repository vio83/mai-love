name: SEO Automation — Ping Search Engines & Update Sitemap

on:
  # Runs every day at 06:00 UTC (08:00 Italy)
  schedule:
    - cron: '0 6 * * *'
  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo-ping-and-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update sitemap lastmod date
        run: |
          TODAY=$(date +%Y-%m-%d)
          sed -i "s|<lastmod>.*</lastmod>|<lastmod>${TODAY}</lastmod>|g" docs/sitemap.xml
          echo "Updated sitemap.xml with date: $TODAY"

      - name: Ping Google with sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://vio83.github.io/vio83-ai-orchestra/sitemap.xml" || true
          echo "Pinged Google"

      - name: Ping Bing with sitemap
        run: |
          curl -s "https://www.bing.com/ping?sitemap=https://vio83.github.io/vio83-ai-orchestra/sitemap.xml" || true
          echo "Pinged Bing"

      - name: Ping IndexNow (Bing/Yandex/DuckDuckGo instant indexing)
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "vio83.github.io",
              "key": "3e6f9ffe76d0f756d7492ec16fd4d501",
              "keyLocation": "https://vio83.github.io/vio83-ai-orchestra/3e6f9ffe76d0f756d7492ec16fd4d501.txt",
              "urlList": [
                "https://vio83.github.io/vio83-ai-orchestra/",
                "https://vio83.github.io/vio83-ai-orchestra/sitemap.xml"
              ]
            }' || true
          echo "Pinged IndexNow"

      - name: Fetch GitHub repo stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STARS=$(gh api repos/vio83/vio83-ai-orchestra --jq '.stargazers_count' 2>/dev/null || echo "0")
          FORKS=$(gh api repos/vio83/vio83-ai-orchestra --jq '.forks_count' 2>/dev/null || echo "0")
          WATCHERS=$(gh api repos/vio83/vio83-ai-orchestra --jq '.subscribers_count' 2>/dev/null || echo "0")
          ISSUES=$(gh api repos/vio83/vio83-ai-orchestra --jq '.open_issues_count' 2>/dev/null || echo "0")
          TODAY=$(date +%Y-%m-%d)

          mkdir -p data
          echo "{\"date\":\"$TODAY\",\"stars\":$STARS,\"forks\":$FORKS,\"watchers\":$WATCHERS,\"issues\":$ISSUES}" >> data/growth-stats.jsonl

          echo "=== VIO 83 Daily Stats ($TODAY) ==="
          echo "Stars: $STARS | Forks: $FORKS | Watchers: $WATCHERS | Issues: $ISSUES"

      - name: Commit changes
        run: |
          git config user.name "VIO 83 SEO Bot"
          git config user.email "porcu.v.83@gmail.com"
          git add docs/sitemap.xml data/growth-stats.jsonl 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore(seo): daily sitemap update + stats tracking [skip ci]"
          git push || true
