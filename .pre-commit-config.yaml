repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
  - repo: local
    hooks:
      - id: typecheck
        name: TypeScript check
        entry: npx tsc --noEmit
        language: system
        types: [ts, tsx]
        pass_filenames: false
      - id: python-compile
        name: Python compile
        entry: python3 -m py_compile
        language: system
        types: [python]
      - id: api-key-guardian
        name: API Key Guardian
        entry: bash scripts/security/api_key_guardian.sh pre-commit
        language: system
        pass_filenames: false
        always_run: true
